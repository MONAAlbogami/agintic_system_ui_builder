<svg width="680" height="1180" viewBox="0 0 680 1180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Multi-agent AI IDE architecture</title>
<desc>User prompt flows through the orchestrator, guardrail agents, planner, build agents, and a runner/reflection loop with a debug agent, ending in a completed project.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<style>
.t{font-family:Arial,Helvetica,sans-serif;font-size:14px;fill:#2C2C2A;}
.ts{font-family:Arial,Helvetica,sans-serif;font-size:12px;fill:#5F5E5A;}
.th{font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;fill:#2C2C2A;}
</style>

<!-- User -->
<rect x="240" y="20" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">User prompt</text>

<line x1="340" y1="64" x2="340" y2="100" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Orchestrator -->
<rect x="220" y="100" width="240" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="#26215C">Orchestrator agent</text>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Central coordinator + memory</text>

<line x1="340" y1="156" x2="340" y2="192" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Guardrails row -->
<rect x="120" y="192" width="210" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="225" y="212" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Input validation</text>
<text class="ts" x="225" y="232" text-anchor="middle" dominant-baseline="central" fill="#712B13">Length, empty checks</text>

<rect x="350" y="192" width="210" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="455" y="212" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Threat detection</text>
<text class="ts" x="455" y="232" text-anchor="middle" dominant-baseline="central" fill="#712B13">Injection + keyword scan</text>

<line x1="340" y1="156" x2="225" y2="192" stroke="#5F5E5A" stroke-width="1.5" opacity="0"/>
<path d="M320 175 L225 175 L225 192" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M360 175 L455 175 L455 192" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="225" y1="248" x2="340" y2="284" stroke="#5F5E5A" stroke-width="1.5" opacity="0"/>
<path d="M225 248 L225 265 L340 265 L340 284" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M455 248 L455 265 L340 265" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>

<!-- Planner -->
<rect x="220" y="284" width="240" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="304" text-anchor="middle" dominant-baseline="central" fill="#04342C">Planner agent</text>
<text class="ts" x="340" y="324" text-anchor="middle" dominant-baseline="central" fill="#085041">Builds project blueprint</text>

<line x1="340" y1="340" x2="340" y2="376" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Build stage container -->
<rect x="100" y="376" width="480" height="180" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="120" y="400" fill="#085041">Build stage</text>

<rect x="130" y="416" width="130" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="195" y="436" text-anchor="middle" dominant-baseline="central" fill="#04342C">Search agent</text>
<text class="ts" x="195" y="456" text-anchor="middle" dominant-baseline="central" fill="#085041">Tavily docs lookup</text>

<rect x="275" y="416" width="130" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="340" y="436" text-anchor="middle" dominant-baseline="central" fill="#04342C">Coding agent</text>
<text class="ts" x="340" y="456" text-anchor="middle" dominant-baseline="central" fill="#085041">Generates + reviews code</text>

<rect x="420" y="416" width="140" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="490" y="436" text-anchor="middle" dominant-baseline="central" fill="#04342C">File / package mgr</text>
<text class="ts" x="490" y="456" text-anchor="middle" dominant-baseline="central" fill="#085041">Writes files, deps</text>

<line x1="260" y1="444" x2="273" y2="444" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="405" y1="444" x2="418" y2="444" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="340" y1="556" x2="340" y2="592" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Runner -->
<rect x="220" y="592" width="240" height="56" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="612" text-anchor="middle" dominant-baseline="central" fill="#412402">Runner agent</text>
<text class="ts" x="340" y="632" text-anchor="middle" dominant-baseline="central" fill="#633806">Executes app.py in sandbox</text>

<line x1="340" y1="648" x2="340" y2="684" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Reflection / decision -->
<rect x="220" y="684" width="240" height="56" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="340" y="704" text-anchor="middle" dominant-baseline="central" fill="#412402">Reflection agent</text>
<text class="ts" x="340" y="724" text-anchor="middle" dominant-baseline="central" fill="#633806">Approved?</text>

<!-- No branch to debug -->
<path d="M460 712 L560 712 L560 800" fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="490" y="705" fill="#712B13">No</text>

<rect x="440" y="800" width="200" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="540" y="820" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Debug agent</text>
<text class="ts" x="540" y="840" text-anchor="middle" dominant-baseline="central" fill="#712B13">Self-heals code</text>

<path d="M440 828 L340 828 L340 740" fill="none" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="360" y="820" fill="#712B13">retry, max 3</text>

<!-- Yes branch to done -->
<path d="M220 712 L120 712 L120 900" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="140" y="705" fill="#085041">Yes</text>

<rect x="20" y="900" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="120" y="920" text-anchor="middle" dominant-baseline="central">Project complete</text>
<text class="ts" x="120" y="940" text-anchor="middle" dominant-baseline="central">Files + logs.json saved</text>

<!-- Memory agent side note -->
<path d="M220 128 L60 128 L60 940 L20 940" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3"/>
<rect x="0" y="960" width="200" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="100" y="982" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Memory agent: shared state across all stages</text>
</svg>
